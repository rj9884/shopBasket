<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shopBasket - Electronics Store</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <a class="nav-logo" href="index.html">
                <i class="fa-solid fa-basket-shopping"></i> shopBasket
            </a>
            <a href="index.html" class="active"><i class="fa-solid fa-house"></i> Home</a>
            <a href="orders.html"><i class="fa-solid fa-box-open"></i> Orders</a>
        </div>
        <div class="nav-right">
            <a href="cart.html" class="cart-icon-wrapper">
                <i class="fa-solid fa-cart-shopping"></i> Cart
                <span id="cartBadge" class="cart-badge" style="display: none;">0</span>
            </a>
            <a href="login.html"><i class="fa-solid fa-user"></i> Login</a>
            <button id="themeToggle" class="theme-btn" title="Toggle Dark Mode">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </nav>

    <div class="container">
        <div class="layout-main">
            <!-- Sidebar Filters -->
            <aside class="sidebar">
                <h2><i class="fa-solid fa-sliders"></i> Filters</h2>
                
                <div class="filter-group">
                    <h3>Categories</h3>
                    <label class="filter-option">
                        <input type="radio" name="category" value="all" checked> All Products
                    </label>
                    <label class="filter-option">
                        <input type="radio" name="category" value="Laptops"> Laptops
                    </label>
                    <label class="filter-option">
                        <input type="radio" name="category" value="Smartphones"> Smartphones
                    </label>
                    <label class="filter-option">
                        <input type="radio" name="category" value="Tablets"> Tablets
                    </label>
                    <label class="filter-option">
                        <input type="radio" name="category" value="Headphones"> Headphones
                    </label>
                    <label class="filter-option">
                        <input type="radio" name="category" value="Smartwatches"> Smartwatches
                    </label>
                    <label class="filter-option">
                        <input type="radio" name="category" value="Gaming"> Gaming
                    </label>
                </div>

                <div class="filter-group">
                    <h3>Price Range</h3>
                    <label class="filter-option">
                        <input type="radio" name="price" value="all" checked> Any Price
                    </label>
                    <label class="filter-option">
                        <input type="radio" name="price" value="0-10000"> Under ₹10,000
                    </label>
                    <label class="filter-option">
                        <input type="radio" name="price" value="10000-50000"> ₹10,000 - ₹50,000
                    </label>
                    <label class="filter-option">
                        <input type="radio" name="price" value="50000-100000"> ₹50,000 - ₹1,00,000
                    </label>
                    <label class="filter-option">
                        <input type="radio" name="price" value="100000+"> Over ₹1,00,000
                    </label>
                </div>

                <div class="filter-group">
                    <h3>Customer Rating</h3>
                    <label class="filter-option">
                        <input type="radio" name="rating" value="all" checked> All Ratings
                    </label>
                    <label class="filter-option">
                        <input type="radio" name="rating" value="4"> 
                        <span><i class="fa-solid fa-star" style="color:var(--star-gold)"></i><i class="fa-solid fa-star" style="color:var(--star-gold)"></i><i class="fa-solid fa-star" style="color:var(--star-gold)"></i><i class="fa-solid fa-star" style="color:var(--star-gold)"></i> 4 & Up</span>
                    </label>
                    <label class="filter-option">
                        <input type="radio" name="rating" value="3"> 
                        <span><i class="fa-solid fa-star" style="color:var(--star-gold)"></i><i class="fa-solid fa-star" style="color:var(--star-gold)"></i><i class="fa-solid fa-star" style="color:var(--star-gold)"></i> 3 & Up</span>
                    </label>
                </div>
            </aside>

            <!-- Product Display Area -->
            <main class="content-area">
                <h1 class="products-title">Featured Products</h1>
                <div id="products" class="products-grid">
                    <!-- Products will be injected via JS -->
                </div>
            </main>
        </div>
    </div>

    <!-- Script for handling UI and API logic -->
    <script src="js/products.js"></script>
    <script src="js/theme.js"></script>
</body>
</html>
